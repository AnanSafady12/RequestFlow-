# docker-compose.yml
# This file lets you start the PostgreSQL database with a single command.
# Run: docker compose up -d
# The -d flag means "run in the background" so it doesn't block your terminal.

version: '3.9'

services:
  # This is the PostgreSQL database service
  postgres:
    image: postgres:16-alpine       # Use PostgreSQL version 16 (alpine = small image)
    container_name: requestflow_db  # Give the container a friendly name
    restart: unless-stopped         # Restart automatically if it crashes

    environment:
      # These are the database credentials — they come from the .env file
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    ports:
      # Map port 5432 on your computer to port 5432 inside the container
      # This lets Prisma (our ORM) connect to the database from your machine
      - '5432:5432'

    volumes:
      # Save the database data to a named volume so it persists even if the container restarts
      - postgres_data:/var/lib/postgresql/data

# Named volume — Docker manages where this is stored on your machine
volumes:
  postgres_data:
