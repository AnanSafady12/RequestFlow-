version: '3.9'

services:
  # Database Service
  db:
    image: postgres:16-alpine
    container_name: requestflow_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-requestflow_db}
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-requestflow_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend Node.js Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: requestflow_server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '3000:3000'
    env_file:
      - .env
      - ./server/.env
    environment:
      # Override DATABASE_URL to use the internal Docker network name 'db' instead of localhost
      DATABASE_URL: "postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-requestflow_db}?schema=public"

  # Frontend React App (Nginx)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: requestflow_client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - '5173:80'

volumes:
  postgres_data:
