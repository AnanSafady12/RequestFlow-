version: "1"

services:
  # ------------------------------------
  # 1. Backend Node.js Server
  # ------------------------------------
  - type: web
    name: requestflow-server
    env: docker # Tells Render to use your server/Dockerfile
    plan: free
    rootDir: server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production

      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true

      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: ADMIN_EMAIL
        value: "admin@tps.com"
      - key: ADMIN_PASSWORD
        sync: false

  # ------------------------------------
  # 2. Frontend React Client
  # ------------------------------------
  - type: web
    name: requestflow-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      # Required for React Router to work properly on static hosts
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: "PASTE_SERVER_URL_HERE"
      - key: VITE_SOCKET_URL
        value: "PASTE_SERVER_URL_HERE"

