version: "1"

services:
  # ------------------------------------
  # 1. Backend Node.js Server
  # ------------------------------------
  - type: web
    name: requestflow-server
    env: docker # Tells Render to use your server/Dockerfile
    plan: free
    rootDir: server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: requestflow-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: "*" # To prevent CORS errors initially
      - key: EMAIL_USER
        sync: false # Requires manual entry in Render dashboard
      - key: EMAIL_PASS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

  # ------------------------------------
  # 2. Frontend React Client
  # ------------------------------------
  - type: web
    name: requestflow-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      # Required for React Router to work properly on static hosts
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false # Requires manual entry in Render dashboard
      - key: VITE_SOCKET_URL
        sync: false 

databases:
  # ------------------------------------
  # 3. PostgreSQL Database
  # ------------------------------------
  - name: requestflow-db
    databaseName: requestflow_production
    user: requestflow_admin
    plan: free
